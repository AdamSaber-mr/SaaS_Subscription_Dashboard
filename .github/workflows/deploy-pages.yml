name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          GHPAGES_BASE: /SaaS_Subscription_Dashboard/
          # Pages only hosts the static frontend; the API stays wherever you
          # run it. localhost works because browsers exempt it from
          # mixed-content blocking — run `php artisan serve` locally and the
          # published site talks to it.
          VITE_API_URL: http://localhost:8000/api
        run: |
          npm ci
          npm run build
          # SPA fallback: Pages serves 404.html for unknown paths, so deep
          # links like /customers/12 keep working.
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
